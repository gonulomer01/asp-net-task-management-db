<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Hesap Oluştur</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
        }
        html.dark {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --input-bg: #0f172a;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
        }
        body { background-color: var(--bg-base); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        .top-actions { position: absolute; top: 24px; right: 24px; }
        .theme-toggle-btn { background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .theme-toggle-btn:hover { background: var(--bg-base); }
        .login-card { background-color: var(--bg-surface); border: 1px solid var(--border-color); width: 100%; max-width: 380px; padding: 40px; box-sizing: border-box; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05); }
        .logo-area { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; justify-content: center; }
        .logo-icon { width: 12px; height: 12px; background-color: var(--primary); border-radius: 3px; transform: rotate(45deg); }
        .logo-text { font-size: 20px; font-weight: 700; tracking: -0.5px; }
        .card-subtitle { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 32px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 13px; font-weight: 500; color: var(--text-primary); }
        input { background-color: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text-primary); box-sizing: border-box; transition: all 0.2s; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .submit-btn { background-color: var(--primary); border: none; border-radius: 8px; color: #ffffff; font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        .submit-btn:hover { background-color: var(--primary-hover); }
        .footer-text { text-align: center; margin-top: 28px; font-size: 14px; color: var(--text-secondary); }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="top-actions">
        <button class="theme-toggle-btn" onclick="toggleTheme()">Tema Değiştir</button>
    </div>

    <div class="login-card">
        <div class="logo-area">
            
            <div class="logo-text">Hesap Oluştur</div>
        </div>
        <div class="card-subtitle">Platforma katılmak için bilgilerinizi girin</div>
        
        <form id="registerForm">
            <div class="input-group">
                <label for="regUsername">Kullanıcı Adı *</label>
                <input type="text" id="regUsername" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="regPassword">Şifre *</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="input-group">
                <label for="regEmail">E-posta</label>
                <input type="email" id="regEmail" autocomplete="off">
            </div>
            <button type="submit" class="submit-btn">Kayıt Ol</button>
        </form>

        <div class="footer-text">
            Zaten bir hesabınız var mı? <a href="/login.html">Giriş Yap</a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userId')) {
            window.location.href = '/index.html';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;
            const role = "User";

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password, email, role })
            });

            if (res.ok) {
                alert("Kayıt başarılı! Giriş ekranına yönlendiriliyorsunuz.");
                window.location.href = '/login.html';
            } else {
                const data = await res.json();
                alert("Hata: " + (data.error || "Kayıt başarısız."));
            }
        });
    </script>
</body>
</html>
