<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Hesap Oluştur</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
</head>
<body>
    <div class="split-layout">
        <div class="brand-side">
            <img src="/image.png" class="brand-logo" alt="Melikgazi Belediyesi" width="513" height="912">
        </div>
        <div class="form-side">
            <div class="form-container">
                <h1 class="site-context-title" data-key="site_title"></h1>
                <h2 data-key="register_btn" style="font-size:18px; margin-bottom:20px; text-align:center;"></h2>
                <form id="registerForm">
                    <div class="field-block">
                        <label data-key="username"></label>
                        <input type="text" id="regUsername" required>
                    </div>
                    <div class="field-block">
                        <label data-key="password"></label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="field-block">
                        <label data-key="email"></label>
                        <input type="email" id="regEmail">
                    </div>
                    <div class="field-block">
                        <label data-key="department"></label>
                        <select id="regDepartment" required></select>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="register_btn"></button>
                    <div style="text-align:center; margin-top:16px; font-size:14px;">
                        <span data-key="has_acc"></span><a href="/login.html" data-key="login_btn" style="color:var(--btn-prime-bg); font-weight:700; text-decoration:none;"></a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        async function populateDepartments() {
            const res = await fetch('/api/departments');
            const depts = await res.json();
            const select = document.getElementById('regDepartment');
            select.innerHTML = '';
            depts.forEach(d => {
                select.innerHTML += `<option value="${escapeHtml(d.name)}">${escapeHtml(d.name)}</option>`;
            });
        }
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('regUsername').value,
                password: document.getElementById('regPassword').value,
                email: document.getElementById('regEmail').value,
                department: document.getElementById('regDepartment').value,
                role: "User"
            };
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                window.location.href = '/login.html';
            } else {
                const err = await res.json();
                alert(err.error || "Hata oluştu.");
            }
        });
        populateDepartments();
    </script>
</body>
</html>
