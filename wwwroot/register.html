<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; color: #0f172a; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-box { width: 100%; max-w: 400px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1); padding: 32px; box-sizing: border-box; border: 1px solid #e2e8f0; }
        h2 { margin: 0 0 24px 0; font-size: 24px; font-weight: 700; text-align: center; color: #7c3aed; }
        form { display: flex; flex-direction: column; gap: 16px; }
        input { padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        input:focus { border-color: #7c3aed; outline: none; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
        button { padding: 10px; border: none; border-radius: 8px; background: #7c3aed; color: #ffffff; font-weight: 600; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #6d28d9; }
        .link-btn { background: none; border: none; color: #64748b; text-decoration: underline; font-size: 13px; margin-top: 16px; width: 100%; cursor: pointer; }
        .link-btn:hover { color: #0f172a; }
    </style>
</head>
<body>

    <div class="auth-box">
        <h2>Yeni Hesap Oluştur</h2>
        <form id="registerForm">
            <input type="text" id="regUsername" placeholder="Kullanıcı Adı *" required>
            <input type="password" id="regPassword" placeholder="Şifre *" required>
            <input type="email" id="regEmail" placeholder="E-posta (Opsiyonel)">
            <button type="submit">Kayıt Ol</button>
        </form>
        <button class="link-btn" onclick="window.location.href='/login.html'">Zaten hesabım var, Giriş Yap</button>
    </div>

    <script>
        if (localStorage.getItem('userId')) {
            window.location.href = '/index.html';
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;
            const role = "User";

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password, email, role })
            });

            if (res.ok) {
                alert("Kayıt başarılı! Giriş ekranına yönlendiriliyorsunuz.");
                window.location.href = '/login.html';
            } else {
                const data = await res.json();
                alert("Hata: " + (data.error || "Kayıt başarısız."));
            }
        });
    </script>
</body>
</html>
