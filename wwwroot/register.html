<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hesap Oluştur</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
</head>
<body>

    <div class="split-layout">
        <div class="brand-side">
            <img src="image.png" alt="Logo" class="brand-logo">
        </div>
        <div class="form-side">
            <div class="form-container">
                <div class="site-context-title" data-key="site_title"></div>
                <form id="registerForm">
                    <div class="field-block">
                        <label data-key="username"></label>
                        <input type="text" id="regUsername" required autocomplete="off">
                    </div>
                    <div class="field-block">
                        <label data-key="password"></label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="field-block">
                        <label data-key="email"></label>
                        <input type="email" id="regEmail" autocomplete="off">
                    </div>
                    <div class="field-block">
                        <label data-key="department"></label>
                        <select id="regDepartment">
                            <option value="Ar-Ge">Ar-Ge</option>
                            <option value="Bilgi İşlem">Bilgi İşlem</option>
                            <option value="İnsan Kaynakları">İnsan Kaynakları</option>
                            <option value="Yönetim">Yönetim</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="register_btn"></button>
                </form>
                <div class="meta-area">
                    <span data-key="has_acc"></span><a href="/login.html" data-key="login_btn"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userId')) { window.location.href = '/index.html'; }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;
            const department = document.getElementById('regDepartment').value;

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password, email, department, role: "User" })
            });

            if (res.ok) {
                alert("Kayıt başarılı.");
                window.location.href = '/login.html';
            } else {
                alert("Kayıt sırasında bir hata oluştu.");
            }
        });
    </script>
</body>
</html>
