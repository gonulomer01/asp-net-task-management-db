<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Yönetimi</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Admin') { window.location.href = '/index.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1>KATEGORİ KONTROL PANELİ</h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>
    
    <div class="workspace-wrapper">
        <div class="layout-grid">
            <div class="panel-card-form">
                <h2>Yeni Kategori Ekle</h2>
                <form id="categoryForm">
                    <div class="field-block">
                        <label>Kategori Adı *</label>
                        <input type="text" id="categoryName" required>
                    </div>
                    <div class="field-block">
                        <label>Açıklama / Detay</label>
                        <input type="text" id="categoryDescription">
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="save"></button>
                </form>
            </div>
            <div class="panel-card-list">
                <h3>Mevcut Kategoriler</h3>
                <div id="categoryList"></div>
            </div>
        </div>
    </div>

    <script>
        let editingCategoryId = null;

        async function fetchCategories() {
            const res = await fetch('/api/categories');
            const data = await res.json();
            const container = document.getElementById('categoryList');
            container.innerHTML = '';
            data.forEach(x => {
                container.innerHTML += `
                    <div class="data-row-card">
                        <div class="data-row-card-title">${escapeHtml(x.name)}</div>
                        <div class="data-row-card-desc">${escapeHtml(x.description || '')}</div>
                        <div class="data-row-card-actions">
                            <button onclick="startEditCategory(${x.id}, '${escapeHtml(x.name)}', '${escapeHtml(x.description || '')}')">${lang('action_edit')}</button>
                            <button class="abort-btn" onclick="deleteCategory(${x.id})">${lang('action_delete')}</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('categoryName').value;
            const description = document.getElementById('categoryDescription').value;
            const payload = { name, description };
            if (editingCategoryId) payload.id = editingCategoryId;

            const res = await fetch(editingCategoryId ? `/api/categories/${editingCategoryId}` : '/api/categories', {
                method: editingCategoryId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if (res.ok) { editingCategoryId = null; document.getElementById('categoryForm').reset(); fetchCategories(); }
        });

        function startEditCategory(id, name, desc) {
            editingCategoryId = id;
            document.getElementById('categoryName').value = name;
            document.getElementById('categoryDescription').value = desc;
        }

        async function deleteCategory(id) {
            if (!confirm("Silinsin mi?")) return;
            const res = await fetch(`/api/categories/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) fetchCategories();
        }

        fetchCategories();
    </script>
</body>
</html>
