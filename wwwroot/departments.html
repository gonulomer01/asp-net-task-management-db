<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departman Yönetimi</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Admin') { window.location.href = '/index.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1 data-key="departments_header"></h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>
    
    <div class="workspace-wrapper">
        <div class="nav-bar">
            <button id="btnHome" class="nav-link-btn" onclick="window.location.href='/index.html'" data-key="btn_home"></button>
            <button id="btnManageCategories" class="nav-link-btn hidden" onclick="window.location.href='/categories.html'" data-key="btn_cats"></button>
            <button id="btnManageUsers" class="nav-link-btn hidden" onclick="window.location.href='/users.html'" data-key="btn_users"></button>
            <button id="btnManageDepartments" class="nav-link-btn hidden" onclick="window.location.href='/departments.html'" data-key="btn_depts"></button>
            <button id="btnProfile" class="nav-link-btn" onclick="window.location.href='/profile.html'" data-key="btn_prof"></button>
        </div>

        <div class="layout-grid">
            <div class="panel-card-form">
                <h2 data-key="departments_form_title"></h2>
                <form id="departmentForm">
                    <div class="field-block">
                        <label data-key="dept_name_label"></label>
                        <input type="text" id="departmentName" required>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="save"></button>
                </form>
            </div>
            <div class="panel-card-list">
                <h3 data-key="departments_list_title"></h3>
                <div id="departmentList"></div>
            </div>
        </div>
    </div>

    <script>
        let editingDepartmentId = null;
        const loggedInUserRole = localStorage.getItem('userRole');

        async function fetchDepartments() {
            const res = await fetch('/api/departments');
            const data = await res.json();
            const container = document.getElementById('departmentList');
            container.innerHTML = '';
            data.forEach(x => {
                container.innerHTML += `
                    <div class="data-row-card">
                        <div class="data-row-card-header">
                            <div class="data-row-card-title">${escapeHtml(x.name)}</div>
                        </div>
                        <div class="data-row-card-actions">
                            <button onclick="startEditDepartment(${x.id}, '${escapeHtml(x.name)}')">${lang('action_edit')}</button>
                            <button class="abort-btn" onclick="deleteDepartment(${x.id})">${lang('action_delete')}</button>
                        </div>
                    </div>`;
            });
            translateStaticElements();
        }

        document.getElementById('departmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('departmentName').value;
            const payload = { id: editingDepartmentId, name };

            const res = await fetch(editingDepartmentId ? `/api/departments/${editingDepartmentId}` : '/api/departments', {
                method: editingDepartmentId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if (res.ok) { editingDepartmentId = null; document.getElementById('departmentForm').reset(); fetchDepartments(); }
        });

        function startEditDepartment(id, name) {
            editingDepartmentId = id;
            document.getElementById('departmentName').value = name;
        }

        async function deleteDepartment(id) {
            if (!confirm("Silinsin mi?")) return;
            const res = await fetch(`/api/departments/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) {
                fetchDepartments();
            } else {
                const errData = await res.json();
                if (errData.error && dict[getLang()][errData.error]) {
                    alert(lang(errData.error));
                } else {
                    alert("Hata oluştu.");
                }
            }
        }

        function initDepartmentsPage() {
            if (loggedInUserRole === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageUsers').classList.remove('hidden');
            }
            fetchDepartments();
        }

        initDepartmentsPage();
    </script>
</body>
</html>
