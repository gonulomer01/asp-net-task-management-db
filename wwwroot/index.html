<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli</title>
    <script>
        if (!localStorage.getItem('userId')) {
            window.location.href = '/login.html';
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-side: #fafafa;
            --text-title: #388ff9;
            --text-main: #262626;
            --text-muted: #8e8e8e;
            --border: #dbdbdb;
            --input-bg: #ffffff;
            --btn-bg: #111111;
            --btn-text: #ffffff;
            --badge-p-bg: #fef3c7;
            --badge-p-text: #d97706;
            --badge-c-bg: #dcfce7;
            --badge-c-text: #15803d;
        }
        html.dark {
            --bg-base: #0b0f19;
            --bg-side: #111827;
            --text-title: #388ff9;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
            --input-bg: #070a12;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --badge-p-bg: #78350f;
            --badge-p-text: #fde68a;
            --badge-c-bg: #064e3b;
            --badge-c-text: #a7f3d0;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 24px; background-color: var(--bg-base); color: var(--text-main); transition: background-color 0.3s, color 0.3s; }
        .header-area { display: flex; justify-content: space-between; align-items: center; background: var(--bg-side); padding: 16px 24px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 24px; }
        h1 { margin: 0; font-size: 22px; font-weight: 700; }
        .nav-bar { display: flex; gap: 12px; margin-bottom: 24px; }
        .main-container { display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-start; }
        .form-box { width: 360px; background: var(--bg-side); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-sizing: border-box; }
        .list-box { flex: 1; min-width: 400px; background: var(--bg-side); border-radius: 16px; padding: 24px; border: 1px solid var(--border); box-sizing: border-box; }
        h2, h3 { margin-top: 0; color: var(--text-main); font-size: 16px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 12px; font-weight: 600; color: var(--text-main); }
        input, select, textarea { padding: 10px 16px; border: 1px solid var(--border); border-radius: 20px; font-size: 14px; background: var(--input-bg); color: var(--text-main); box-sizing: border-box; width: 100%; }
        input:focus, select:focus, textarea:focus { border-color: var(--text-main); outline: none; }
        button { padding: 8px 18px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg-base); color: var(--text-main); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        button:hover { opacity: 0.8; }
        .primary-btn { background: var(--btn-bg); color: var(--btn-text); border: none; padding: 12px; font-size: 14px; font-weight: 700; }
        .danger-btn { color: #ef4444; border-color: #ef4444; }
        .list-item { padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; background: var(--bg-base); }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-title { font-weight: 700; font-size: 15px; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 12px; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: var(--badge-p-bg); color: var(--badge-p-text); }
        .badge-completed { background: var(--badge-c-bg); color: var(--badge-c-text); }
        .item-desc { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }
        .item-meta { font-size: 11px; color: var(--text-muted); border-top: 1px dashed var(--border); padding-top: 8px; display: flex; gap: 16px; }
        .item-actions { display: flex; gap: 8px; margin-top: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>Ana Menü (<span id="topUsername"></span>)</h1>
        <div>
            <button onclick="toggleTheme()" style="margin-right: 8px;">Tema Değiştir</button>
            <button class="danger-btn" onclick="logout()">Çıkış Yap</button>
        </div>
    </div>

    <div class="nav-bar">
        <button id="btnManageCategories" class="hidden" onclick="window.location.href='/categories.html'">Kategorileri Yönet</button>
        <button id="btnManageUsers" class="hidden" onclick="window.location.href='/users.html'">Kullanıcıları Yönet</button>
        <button onclick="window.location.href='/profile.html'">Profil Ayarları</button>
    </div>

    <div class="main-container">
        <div class="form-box">
            <h2 id="taskFormTitle">Yeni Görev Tanımla</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label>Görev Başlığı</label>
                    <input type="text" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label>Sorumlu Kullanıcı</label>
                    <select id="taskUserId" required></select>
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="taskCategoryId" required></select>
                </div>
                <div class="form-group">
                    <label>Durum</label>
                    <select id="taskStatus">
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea id="taskDescription" rows="3"></textarea>
                </div>
                <button type="submit" id="taskSubmitBtn" class="primary-btn">Görevi Kaydet</button>
                <button type="button" id="taskCancelBtn" class="hidden" onclick="resetTaskForm()">Vazgeç</button>
            </form>
        </div>

        <div class="list-box">
            <h3>Görevler</h3>
            <div id="taskList"></div>
        </div>
    </div>

    <script>
        let editingTaskId = null;

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-User-Id': localStorage.getItem('userId'),
                'X-User-Role': localStorage.getItem('userRole')
            };
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function initPage() {
            document.getElementById('topUsername').textContent = localStorage.getItem('username') + " - " + localStorage.getItem('userRole');
            
            if (localStorage.getItem('userRole') === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageUsers').classList.remove('hidden');
            }
            populateDropdowns();
            fetchTasks();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function populateDropdowns() {
            const resUsers = await fetch('/api/users');
            const users = await resUsers.json();
            const userSelect = document.getElementById('taskUserId');
            userSelect.innerHTML = '';
            
            if (localStorage.getItem('userRole') !== 'Admin') {
                const option = document.createElement('option');
                option.value = localStorage.getItem('userId');
                option.textContent = localStorage.getItem('username');
                userSelect.appendChild(option);
                userSelect.disabled = true;
            } else {
                userSelect.disabled = false;
                users.forEach(u => {
                    const option = document.createElement('option');
                    option.value = u.id;
                    option.textContent = u.username;
                    userSelect.appendChild(option);
                });
            }

            const resCats = await fetch('/api/categories');
            const cats = await resCats.json();
            const catSelect = document.getElementById('taskCategoryId');
            catSelect.innerHTML = '<option value="">-- Kategori Seçin --</option>';
            cats.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                catSelect.appendChild(option);
            });
        }

        async function fetchTasks() {
            const res = await fetch('/api/tasks', { headers: getAuthHeaders() });
            const data = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = data.length === 0 ? '<p style="font-size:14px;">Henüz atanmış bir görev bulunmuyor.</p>' : '';
            data.forEach(x => {
                const badgeClass = x.status === 'Completed' ? 'badge-completed' : 'badge-pending';
                container.innerHTML += `
                    <div class="list-item">
                        <div class="item-header">
                            <span class="item-title">${escapeHtml(x.title)}</span>
                            <span class="badge ${badgeClass}">${escapeHtml(x.status)}</span>
                        </div>
                        <div class="item-desc">${escapeHtml(x.description || 'Açıklama girilmemiş.')}</div>
                        <div class="item-meta">
                            <span>👤 Sorumlu: ${escapeHtml(x.userName)}</span>
                            <span>📁 Kategori: ${escapeHtml(x.categoryName || 'Yok')}</span>
                            <span>🆔 ID: #${x.id}</span>
                        </div>
                        <div class="item-actions">
                            <button onclick="startEditTask(${x.id}, '${escapeHtml(x.title)}', ${x.userId}, '${x.categoryId || ''}', '${escapeHtml(x.status)}', '${escapeHtml(x.description)}')">Düzenle</button>
                            <button class="danger-btn" onclick="deleteTask(${x.id})">Sil</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value;
            const userId = parseInt(document.getElementById('taskUserId').value);
            const categoryId = document.getElementById('taskCategoryId').value ? parseInt(document.getElementById('taskCategoryId').value) : null;
            const status = document.getElementById('taskStatus').value;
            const description = document.getElementById('taskDescription').value;
            const payload = { title, userId, categoryId, status, description };
            if (editingTaskId) payload.id = editingTaskId;

            const res = await fetch(editingTaskId ? `/api/tasks/${editingTaskId}` : '/api/tasks', {
                method: editingTaskId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if(res.ok) { resetTaskForm(); fetchTasks(); }
        });

        function startEditTask(id, title, userId, categoryId, status, description) {
            editingTaskId = id;
            document.getElementById('taskFormTitle').textContent = "Görevi Düzenle (ID: #" + id + ")";
            document.getElementById('taskTitle').value = title;
            document.getElementById('taskUserId').value = userId;
            document.getElementById('taskCategoryId').value = categoryId;
            document.getElementById('taskStatus').value = status;
            document.getElementById('taskDescription').value = description;
            document.getElementById('taskCancelBtn').classList.remove('hidden');
        }

        function resetTaskForm() {
            editingTaskId = null;
            document.getElementById('taskFormTitle').textContent = "Yeni Görev Tanımla";
            document.getElementById('taskCancelBtn').classList.add('hidden');
            document.getElementById('taskForm').reset();
            populateDropdowns();
        }

        async function deleteTask(id) {
            if(!confirm("Bu görevi silmek istediğinize emin misiniz?")) return;
            const res = await fetch(`/api/tasks/${id}`, {method: 'DELETE', headers: getAuthHeaders()});
            if(res.ok) fetchTasks();
        }

        initPage();
    </script>
</body>
</html>
