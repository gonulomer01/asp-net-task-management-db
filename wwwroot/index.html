<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Paneli</title>
    <script>
        if (!localStorage.getItem('userId')) {
            window.location.href = '/login.html';
        }
    </script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #ffffff; color: #000000; }
        .nav-bar { display: flex; gap: 10px; margin: 15px 0; }
        .main-box { max-w: 600px; border: 1px solid #000000; padding: 15px; margin-top: 20px; }
        form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input, textarea, select { padding: 6px; border: 1px solid #000000; font-size: 14px; }
        button { padding: 6px; border: 1px solid #000000; background: #ffffff; cursor: pointer; font-size: 13px; }
        button:hover { background: #eeeeee; }
        .list-item { border-bottom: 1px dashed #000000; padding: 8px 0; }
        .item-actions { margin-top: 5px; display: flex; gap: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Yönetim Paneli (<span id="topUsername"></span>)</h1>
        <button onclick="logout()">Çıkış Yap</button>
    </div>
    <hr>

    <div class="nav-bar">
        <button id="btnManageCategories" class="hidden" onclick="window.location.href='/categories.html'">Kategorileri Yönet</button>
        <button id="btnManageUsers" class="hidden" onclick="window.location.href='/users.html'">Kullanıcıları Yönet</button>
        <button onclick="window.location.href='/profile.html'">Profilimi Düzenle</button>
    </div>

    <div class="main-box">
        <h2 id="taskFormTitle">Görev Ekle</h2>
        <form id="taskForm">
            <input type="text" id="taskTitle" placeholder="Görev Başlığı *" required>
            <select id="taskUserId" required></select>
            <select id="taskCategoryId" required></select>
            <select id="taskStatus">
                <option value="Pending">Pending</option>
                <option value="Completed">Completed</option>
            </select>
            <textarea id="taskDescription" placeholder="Açıklama" rows="2"></textarea>
            <button type="submit" id="taskSubmitBtn">Kaydet</button>
            <button type="button" id="taskCancelBtn" class="hidden" onclick="resetTaskForm()">Vazgeç</button>
        </form>
        <h3>Görev Listesi</h3>
        <div id="taskList"></div>
    </div>

    <script>
        let editingTaskId = null;

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-User-Id': localStorage.getItem('userId'),
                'X-User-Role': localStorage.getItem('userRole')
            };
        }

        function initPage() {
            document.getElementById('topUsername').textContent = localStorage.getItem('username') + " - " + localStorage.getItem('userRole');
            
            if (localStorage.getItem('userRole') === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageUsers').classList.remove('hidden');
            }
            populateDropdowns();
            fetchTasks();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function populateDropdowns() {
            const resUsers = await fetch('/api/users');
            const users = await resUsers.json();
            const userSelect = document.getElementById('taskUserId');
            userSelect.innerHTML = '';
            
            if (localStorage.getItem('userRole') !== 'Admin') {
                const option = document.createElement('option');
                option.value = localStorage.getItem('userId');
                option.textContent = localStorage.getItem('username');
                userSelect.appendChild(option);
                userSelect.disabled = true;
            } else {
                userSelect.disabled = false;
                users.forEach(u => {
                    const option = document.createElement('option');
                    option.value = u.id;
                    option.textContent = u.username;
                    userSelect.appendChild(option);
                });
            }

            const resCats = await fetch('/api/categories');
            const cats = await resCats.json();
            const catSelect = document.getElementById('taskCategoryId');
            catSelect.innerHTML = '<option value="">-- Kategori Seçin --</option>';
            cats.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                catSelect.appendChild(option);
            });
        }

        async function fetchTasks() {
            const res = await fetch('/api/tasks', { headers: getAuthHeaders() });
            const data = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = data.length === 0 ? '<p>Kayıt yok.</p>' : '';
            data.forEach(x => {
                container.innerHTML += `
                    <div class="list-item">
                        <div><strong>ID: #${x.id} - ${escapeHtml(x.title)}</strong> [${escapeHtml(x.status)}]</div>
                        <div>${escapeHtml(x.description)}</div>
                        <div style="font-size: 11px; color: #555555; margin-top: 3px;">
                            Sorumlu: ${escapeHtml(x.userName)} (ID: ${x.userId}) | 
                            Kategori: ${escapeHtml(x.categoryName) || 'Yok'} (ID: ${x.categoryId || 'Yok'})
                        </div>
                        <div class="item-actions">
                            <button onclick="startEditTask(${x.id}, '${escapeHtml(x.title)}', ${x.userId}, '${x.categoryId || ''}', '${escapeHtml(x.status)}', '${escapeHtml(x.description)}')">Düzelt</button>
                            <button onclick="deleteTask(${x.id})">Sil</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('taskTitle').value;
            const userId = parseInt(document.getElementById('taskUserId').value);
            const categoryId = document.getElementById('taskCategoryId').value ? parseInt(document.getElementById('taskCategoryId').value) : null;
            const status = document.getElementById('taskStatus').value;
            const description = document.getElementById('taskDescription').value;
            
            const payload = { title, userId, categoryId, status, description };
            if (editingTaskId) payload.id = editingTaskId;

            const res = await fetch(editingTaskId ? `/api/tasks/${editingTaskId}` : '/api/tasks', {
                method: editingTaskId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if(res.ok) { resetTaskForm(); fetchTasks(); }
        });

        function startEditTask(id, title, userId, categoryId, status, description) {
            editingTaskId = id;
            document.getElementById('taskFormTitle').textContent = "Görev Güncelle (ID: #" + id + ")";
            document.getElementById('taskTitle').value = title;
            document.getElementById('taskUserId').value = userId;
            document.getElementById('taskCategoryId').value = categoryId;
            document.getElementById('taskStatus').value = status;
            document.getElementById('taskDescription').value = description;
            document.getElementById('taskCancelBtn').classList.remove('hidden');
        }

        function resetTaskForm() {
            editingTaskId = null;
            document.getElementById('taskFormTitle').textContent = "Görev Ekle";
            document.getElementById('taskCancelBtn').classList.add('hidden');
            document.getElementById('taskForm').reset();
            populateDropdowns();
        }

        async function deleteTask(id) {
            if(!confirm("Emin misiniz?")) return;
            const res = await fetch(`/api/tasks/${id}`, {method: 'DELETE', headers: getAuthHeaders()});
            if(res.ok) fetchTasks();
        }

        initPage();
    </script>
</body>
</html>
