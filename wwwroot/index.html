<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetim Konsolu</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId')) { window.location.href = '/login.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1 id="topInfoAreaUsername"></h1>
            <div id="topInfoAreaRoleDept" style="font-size:13px; font-weight:700; color:var(--text-sub);"></div>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>

    <div class="workspace-wrapper">
        <div class="nav-bar">
            <button id="btnManageCategories" class="nav-link-btn hidden" onclick="window.location.href='/categories.html'" data-key="btn_cats"></button>
            <button id="btnManageUsers" class="nav-link-btn hidden" onclick="window.location.href='/users.html'" data-key="btn_users"></button>
            <button class="nav-link-btn" onclick="window.location.href='/profile.html'" data-key="btn_prof"></button>
        </div>

        <div class="layout-grid">
            <div class="panel-card-form">
                <h2 id="taskFormTitle"></h2>
                <form id="taskForm">
                    <div class="field-block">
                        <label data-key="title_label"></label>
                        <input type="text" id="taskTitle" required>
                    </div>
                    <div class="field-block">
                        <label data-key="assignee_label"></label>
                        <select id="taskUserId" required></select>
                    </div>
                    <div class="field-block">
                        <label data-key="cat_label"></label>
                        <select id="taskCategoryId" required></select>
                    </div>
                    <div class="field-block">
                        <label data-key="start_label"></label>
                        <input type="datetime-local" id="taskStartDate" required>
                    </div>
                    <div class="field-block">
                        <label data-key="end_label"></label>
                        <input type="datetime-local" id="taskEndDate" required>
                    </div>
                    <div class="field-block">
                        <label data-key="desc_label"></label>
                        <textarea id="taskDescription" rows="3"></textarea>
                    </div>
                    <button type="submit" id="taskSubmitBtn" class="submit-core-btn" data-key="save"></button>
                    <button type="button" id="taskCancelBtn" class="abort-btn hidden" onclick="resetTaskForm()" data-key="cancel"></button>
                </form>
            </div>

            <div class="panel-card-list">
                <h3 id="listTitleHeader"></h3>
                <div id="taskList"></div>
            </div>
        </div>
    </div>

    <script>
        let editingTaskId = null;
        const loggedInUserId = parseInt(localStorage.getItem('userId'));
        const loggedInUserRole = localStorage.getItem('userRole');

        document.getElementById('taskFormTitle').textContent = getLang() === 'tr' ? "GÖREV TANIMLAMA" : "TASK DEFINITION";
        document.getElementById('listTitleHeader').textContent = getLang() === 'tr' ? "AKTİF GÖREV HAVUZU" : "ACTIVE TASK POOL";

        function initPage() {
            document.getElementById('topInfoAreaUsername').textContent = localStorage.getItem('username');
            document.getElementById('topInfoAreaRoleDept').textContent = lang('role_' + loggedInUserRole.toLowerCase()) + " - " + localStorage.getItem('userDept');
            
            if (loggedInUserRole === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageUsers').classList.remove('hidden');
            }
            populateDropdowns();
            fetchTasks();
        }

        async function populateDropdowns() {
            const resUsers = await fetch('/api/users');
            const users = await resUsers.json();
            const userSelect = document.getElementById('taskUserId');
            userSelect.innerHTML = '';
            
            if (loggedInUserRole !== 'Admin') {
                const option = document.createElement('option');
                option.value = loggedInUserId;
                option.textContent = localStorage.getItem('username');
                userSelect.appendChild(option);
                userSelect.disabled = true;
            } else {
                userSelect.disabled = false;
                users.forEach(u => {
                    userSelect.innerHTML += `<option value="${u.id}">${escapeHtml(u.username)} (${escapeHtml(u.department)})</option>`;
                });
            }

            const resCats = await fetch('/api/categories');
            const cats = await resCats.json();
            const catSelect = document.getElementById('taskCategoryId');
            catSelect.innerHTML = '';
            cats.forEach(c => {
                catSelect.innerHTML += `<option value="${c.id}">${escapeHtml(c.name)}</option>`;
            });
        }

        async function fetchTasks() {
            const res = await fetch('/api/tasks', { headers: getAuthHeaders() });
            const data = await res.json();
            const container = document.getElementById('taskList');
            container.innerHTML = '';
            
            data.forEach(x => {
                let badgeText = lang('pending');
                let badgeClass = 'badge-pending';
                if (x.status === 'Completed') {
                    badgeText = lang('completed');
                    badgeClass = 'badge-completed';
                } else if (x.status === 'Başarısız') {
                    badgeText = lang('failed');
                    badgeClass = 'badge-failed';
                }

                const scoreText = x.adminScore ? `${x.adminScore}/100` : lang('not_scored');
                let actionsHtml = '';

                if (x.status === 'Pending' && x.userId === loggedInUserId) {
                    actionsHtml += `
                        <div class="completion-block-area">
                            <input type="text" id="note_${x.id}" placeholder="Görev tamamlama notu yazın...">
                            <input type="file" id="file_${x.id}" style="display:none" onchange="uploadCompletionFile(${x.id})">
                            <button onclick="document.getElementById('file_${x.id}').click()">${lang('action_complete_upload')}</button>
                        </div>
                    `;
                }

                if (loggedInUserRole === 'Admin' || x.createdById === loggedInUserId) {
                    actionsHtml += `
                        <button onclick="startEditTask(${x.id}, '${escapeHtml(x.title)}', ${x.userId}, ${x.categoryId || 'null'}, '${x.startDate}', '${x.endDate}', '${escapeHtml(x.description || '')}')">${lang('action_edit')}</button>
                        <button class="abort-btn" onclick="deleteTask(${x.id})">${lang('action_delete')}</button>
                    `;
                    
                    if (x.status === 'Completed' && x.createdById === loggedInUserId) {
                        actionsHtml += `
                            <input type="number" id="score_val_${x.id}" min="1" max="100" placeholder="1-100" style="width:100px; display:inline-block; margin-left:10px;">
                            <button onclick="submitScore(${x.id})">${lang('action_score_btn')}</button>
                        `;
                    }
                }

                let imgHtml = x.completedImagePath ? `<div style="margin:12px 0;"><a href="${x.completedImagePath}" target="_blank"><img src="${x.completedImagePath}" style="max-width:140px; border:2px solid var(--border-line);"></a></div>` : '';
                let noteHtml = x.completionNote ? `<span><strong>📝 ${lang('task_note')}:</strong> ${escapeHtml(x.completionNote)}</span>` : '';

                container.innerHTML += `
                    <div class="data-row-card">
                        <div class="data-row-card-header">
                            <span class="data-row-card-title">${escapeHtml(x.title)}</span>
                            <span class="badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="data-row-card-desc">${escapeHtml(x.description || '')}</div>
                        ${imgHtml}
                        <div class="data-row-card-meta">
                            <span><strong>👤 ${lang('task_assignee')}:</strong> ${escapeHtml(x.userName)}</span>
                            <span><strong>✍️ ${lang('task_creator')}:</strong> ${escapeHtml(x.createdByName)}</span>
                            <span><strong>📁 ${lang('task_category')}:</strong> ${escapeHtml(x.categoryName)}</span>
                            <span><strong>📅 ${lang('task_timeline')}:</strong> ${new Date(x.startDate).toLocaleString()} - ${new Date(x.endDate).toLocaleString()}</span>
                            ${noteHtml}
                            <span><strong>⭐ ${lang('task_score')}:</strong> ${scoreText}</span>
                        </div>
                        <div class="data-row-card-actions">${actionsHtml}</div>
                    </div>`;
            });
            translateStaticElements();
        }

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('taskTitle').value,
                userId: parseInt(document.getElementById('taskUserId').value),
                categoryId: parseInt(document.getElementById('taskCategoryId').value),
                startDate: document.getElementById('taskStartDate').value,
                endDate: document.getElementById('taskEndDate').value,
                description: document.getElementById('taskDescription').value,
                status: "Pending"
            };

            if (editingTaskId) payload.id = editingTaskId;

            const res = await fetch(editingTaskId ? `/api/tasks/${editingTaskId}` : '/api/tasks', {
                method: editingTaskId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if (res.ok) { resetTaskForm(); fetchTasks(); }
        });

        async function uploadCompletionFile(id) {
            const fileInput = document.getElementById(`file_${id}`);
            if (fileInput.files.length === 0) return;
            const completionNote = document.getElementById(`note_${id}`).value;
            
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("completionNote", completionNote);

            const res = await fetch(`/api/tasks/${id}/complete`, {
                method: 'POST',
                headers: {
                    'X-User-Id': localStorage.getItem('userId'),
                    'X-User-Role': localStorage.getItem('userRole')
                },
                body: formData
            });
            if (res.ok) fetchTasks();
        }

        async function submitScore(id) {
            const score = parseInt(document.getElementById(`score_val_${id}`).value);
            if (isNaN(score) || score < 1 || score > 100) return alert("1-100!");

            const res = await fetch(`/api/tasks/${id}/score`, {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(score)
            });
            if (res.ok) fetchTasks();
        }

        function startEditTask(id, title, userId, categoryId, start, end, desc) {
            editingTaskId = id;
            document.getElementById('taskTitle').value = title;
            document.getElementById('taskUserId').value = userId;
            document.getElementById('taskCategoryId').value = categoryId;
            document.getElementById('taskStartDate').value = start.substring(0,16);
            document.getElementById('taskEndDate').value = end.substring(0,16);
            document.getElementById('taskDescription').value = desc;
            document.getElementById('taskCancelBtn').classList.remove('hidden');
        }

        function resetTaskForm() {
            editingTaskId = null;
            document.getElementById('taskForm').reset();
            document.getElementById('taskCancelBtn').classList.add('hidden');
            populateDropdowns();
        }

        async function deleteTask(id) {
            if (!confirm("Emin misiniz?")) return;
            const res = await fetch(`/api/tasks/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) fetchTasks();
        }

        initPage();
    </script>
</body>
</html>
