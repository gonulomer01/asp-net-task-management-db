<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel Yönetimi</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Admin') { window.location.href = '/index.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1 data-key="users_header"></h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>
    
    <div class="workspace-wrapper">
        <div class="nav-bar">
            <button id="btnHome" class="nav-link-btn" onclick="window.location.href='/index.html'" data-key="btn_home"></button>
            <button id="btnManageCategories" class="nav-link-btn hidden" onclick="window.location.href='/categories.html'" data-key="btn_cats"></button>
            <button id="btnManageUsers" class="nav-link-btn hidden" onclick="window.location.href='/users.html'" data-key="btn_users"></button>
            <button id="btnManageDepartments" class="nav-link-btn hidden" onclick="window.location.href='/departments.html'" data-key="btn_depts"></button>
            <button id="btnProfile" class="nav-link-btn" onclick="window.location.href='/profile.html'" data-key="btn_prof"></button>
        </div>

        <div class="layout-grid">
            <div class="panel-card-form">
                <h2 data-key="users_form_title"></h2>
                <form id="userForm">
                    <div class="field-block">
                        <label data-key="username"></label>
                        <input type="text" id="userUsername" required>
                    </div>
                    <div class="field-block">
                        <label data-key="password"></label>
                        <input type="password" id="userPassword">
                    </div>
                    <div class="field-block">
                        <label data-key="email"></label>
                        <input type="email" id="userEmail">
                    </div>
                    <div class="field-block">
                        <label data-key="department"></label>
                        <select id="userDepartment" required></select>
                    </div>
                    <div class="field-block">
                        <label data-key="role"></label>
                        <select id="userRole">
                            <option value="User" data-key="role_user"></option>
                            <option value="Admin" data-key="role_admin"></option>
                        </select>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="save"></button>
                </form>
            </div>
            <div class="panel-card-list">
                <h3 data-key="users_list_title"></h3>
                <div id="userList"></div>
            </div>
        </div>
    </div>

    <script>
        let editingUserId = null;
        const loggedInUserRole = localStorage.getItem('userRole');

        async function populateDepartments() {
            const res = await fetch('/api/departments');
            const depts = await res.json();
            const select = document.getElementById('userDepartment');
            select.innerHTML = '';
            depts.forEach(d => {
                select.innerHTML += `<option value="${escapeHtml(d.name)}">${escapeHtml(d.name)}</option>`;
            });
        }

        async function fetchUsers() {
            const res = await fetch('/api/users');
            const data = await res.json();
            const container = document.getElementById('userList');
            container.innerHTML = '';
            data.forEach(x => {
                const translatedRole = lang('role_' + x.role.toLowerCase());
                container.innerHTML += `
                    <div class="data-row-card">
                        <div class="data-row-card-header">
                            <div class="data-row-card-title">${escapeHtml(x.username)}</div>
                        </div>
                        <div class="data-row-card-desc">
                            ${lang('text_mail')}: ${escapeHtml(x.email || lang('text_none'))} | ${lang('text_dept')}: ${escapeHtml(x.department)} | ${lang('text_role')}: ${translatedRole}
                        </div>
                        <div class="data-row-card-actions">
                            <button onclick="startEditUser(${x.id}, '${escapeHtml(x.username)}', '${escapeHtml(x.email || '')}', '${escapeHtml(x.role)}', '${escapeHtml(x.department)}')">${lang('action_edit')}</button>
                            <button class="abort-btn" onclick="deleteUser(${x.id})">${lang('action_delete')}</button>
                        </div>
                    </div>`;
            });
            translateStaticElements();
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const passVal = document.getElementById('userPassword').value;
            if (!editingUserId && !passVal) {
                alert(getLang() === 'tr' ? "Şifre alanı zorunludur!" : "Password is required!");
                return;
            }
            const payload = {
                username: document.getElementById('userUsername').value,
                password: passVal,
                email: document.getElementById('userEmail').value,
                role: document.getElementById('userRole').value,
                department: document.getElementById('userDepartment').value
            };
            if (editingUserId) payload.id = editingUserId;

            const res = await fetch(editingUserId ? `/api/users/${editingUserId}` : '/api/users', {
                method: editingUserId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if (res.ok) { editingUserId = null; document.getElementById('userForm').reset(); initUsersPage(); }
        });

        function startEditUser(id, name, email, role, dept) {
            editingUserId = id;
            document.getElementById('userUsername').value = name;
            document.getElementById('userPassword').value = '';
            document.getElementById('userEmail').value = email;
            document.getElementById('userRole').value = role;
            document.getElementById('userDepartment').value = dept;
        }

        async function deleteUser(id) {
            if (!confirm("Kullanıcı silinsin mi?")) return;
            const res = await fetch(`/api/users/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) {
                fetchUsers();
            } else {
                const errData = await res.json();
                if (errData.error && dict[getLang()][errData.error]) {
                    alert(lang(errData.error));
                } else {
                    alert("Hata oluştu.");
                }
            }
        }

        async function initUsersPage() {
            if (loggedInUserRole === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageDepartments').classList.remove('hidden');
            }
            await populateDepartments();
            await fetchUsers();
        }

        initUsersPage();
    </script>
</body>
</html>
