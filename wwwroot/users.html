<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel Yönetimi</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Admin') { window.location.href = '/index.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1>SİSTEM PERSONEL KONTROLÜ</h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>
    
    <div class="workspace-wrapper">
        <div class="layout-grid">
            <div class="panel-card-form">
                <h2>Personel Kaydı / Güncelleme</h2>
                <form id="userForm">
                    <div class="field-block">
                        <label data-key="username"></label>
                        <input type="text" id="userUsername" required>
                    </div>
                    <div class="field-block">
                        <label data-key="password"></label>
                        <input type="password" id="userPassword" required>
                    </div>
                    <div class="field-block">
                        <label data-key="email"></label>
                        <input type="email" id="userEmail">
                    </div>
                    <div class="field-block">
                        <label data-key="department"></label>
                        <select id="userDepartment">
                            <option value="Ar-Ge">Ar-Ge</option>
                            <option value="Bilgi İşlem">Bilgi İşlem</option>
                            <option value="İnsan Kaynakları">İnsan Kaynakları</option>
                            <option value="Yönetim">Yönetim</option>
                        </select>
                    </div>
                    <div class="field-block">
                        <label data-key="role"></label>
                        <select id="userRole">
                            <option value="User">User</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="save"></button>
                </form>
            </div>
            <div class="panel-card-list">
                <h3>Aktif Personel Listesi</h3>
                <div id="userList"></div>
            </div>
        </div>
    </div>

    <script>
        let editingUserId = null;

        async function fetchUsers() {
            const res = await fetch('/api/users');
            const data = await res.json();
            const container = document.getElementById('userList');
            container.innerHTML = '';
            data.forEach(x => {
                container.innerHTML += `
                    <div class="data-row-card">
                        <div class="data-row-card-title">${escapeHtml(x.username)} <span class="role-tag">${escapeHtml(x.role)}</span></div>
                        <div class="data-row-card-desc">📧 ${escapeHtml(x.email || 'Yok')} | 📊 Dept: ${escapeHtml(x.department)}</div>
                        <div class="data-row-card-actions">
                            <button onclick="startEditUser(${x.id}, '${escapeHtml(x.username)}', '${escapeHtml(x.password)}', '${escapeHtml(x.email || '')}', '${escapeHtml(x.role)}', '${escapeHtml(x.department)}')">${lang('action_edit')}</button>
                            <button class="abort-btn" onclick="deleteUser(${x.id})">${lang('action_delete')}</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                username: document.getElementById('userUsername').value,
                password: document.getElementById('userPassword').value,
                email: document.getElementById('userEmail').value,
                role: document.getElementById('userRole').value,
                department: document.getElementById('userDepartment').value
            };
            if (editingUserId) payload.id = editingUserId;

            const res = await fetch(editingUserId ? `/api/users/${editingUserId}` : '/api/users', {
                method: editingUserId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if (res.ok) { editingUserId = null; document.getElementById('userForm').reset(); fetchUsers(); }
        });

        function startEditUser(id, name, pass, email, role, dept) {
            editingUserId = id;
            document.getElementById('userUsername').value = name;
            document.getElementById('userPassword').value = pass;
            document.getElementById('userEmail').value = email;
            document.getElementById('userRole').value = role;
            document.getElementById('userDepartment').value = dept;
        }

        async function deleteUser(id) {
            if (!confirm("Kullanıcı silinsin mi?")) return;
            const res = await fetch(`/api/users/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) fetchUsers();
        }

        fetchUsers();
    </script>
</body>
</html>
