<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kullanıcı Yönetimi</title>
    <script>
        if (!localStorage.getItem('userId') || localStorage.getItem('userRole') !== 'Admin') {
            window.location.href = '/index.html';
        }
    </script>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #ffffff; color: #000000; }
        .main-box { max-w: 500px; border: 1px solid #000000; padding: 15px; margin-top: 20px; }
        form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input, select { padding: 6px; border: 1px solid #000000; font-size: 14px; }
        button { padding: 6px; border: 1px solid #000000; background: #ffffff; cursor: pointer; font-size: 13px; }
        button:hover { background: #eeeeee; }
        .list-item { border-bottom: 1px dashed #000000; padding: 8px 0; }
        .item-actions { margin-top: 5px; display: flex; gap: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <button onclick="window.location.href='/index.html'">← Panele Geri Dön</button>
    
    <div class="main-box">
        <h2 id="userFormTitle">Kullanıcı Ekle</h2>
        <form id="userForm">
            <input type="text" id="userUsername" placeholder="Kullanıcı Adı *" required>
            <input type="password" id="userPassword" placeholder="Şifre *" required>
            <input type="email" id="userEmail" placeholder="E-posta">
            <select id="userRole">
                <option value="User">User</option>
                <option value="Admin">Admin</option>
            </select>
            <button type="submit" id="userSubmitBtn">Kaydet</button>
            <button type="button" id="userCancelBtn" class="hidden" onclick="resetUserForm()">Vazgeç</button>
        </form>
        <h3>Kullanıcı Listesi</h3>
        <div id="userList"></div>
    </div>

    <script>
        let editingUserId = null;

        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-User-Id': localStorage.getItem('userId'),
                'X-User-Role': localStorage.getItem('userRole')
            };
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function fetchUsers() {
            const res = await fetch('/api/users');
            const data = await res.json();
            const container = document.getElementById('userList');
            container.innerHTML = data.length === 0 ? '<p>Kayıt yok.</p>' : '';
            data.forEach(x => {
                container.innerHTML += `
                    <div class="list-item">
                        <div><strong>ID: #${x.id}</strong> - ${escapeHtml(x.username)} (${escapeHtml(x.role)})</div>
                        <div>${escapeHtml(x.email || '')}</div>
                        <div class="item-actions">
                            <button onclick="startEditUser(${x.id}, '${escapeHtml(x.username)}', '${escapeHtml(x.password)}', '${escapeHtml(x.email || '')}', '${escapeHtml(x.role)}')">Düzelt</button>
                            <button onclick="deleteUser(${x.id})">Sil</button>
                        </div>
                    </div>`;
            });
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('userUsername').value;
            const password = document.getElementById('userPassword').value;
            const email = document.getElementById('userEmail').value;
            const role = document.getElementById('userRole').value;

            const payload = { username, password, email, role };
            if (editingUserId) payload.id = editingUserId;

            const res = await fetch(editingUserId ? `/api/users/${editingUserId}` : '/api/users', {
                method: editingUserId ? 'PUT' : 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });
            if(res.ok) { resetUserForm(); fetchUsers(); }
        });

        function startEditUser(id, username, password, email, role) {
            editingUserId = id;
            document.getElementById('userFormTitle').textContent = "Kullanıcı Güncelle (ID: #" + id + ")";
            document.getElementById('userUsername').value = username;
            document.getElementById('userPassword').value = password;
            document.getElementById('userEmail').value = email;
            document.getElementById('userRole').value = role;
            document.getElementById('userCancelBtn').classList.remove('hidden');
        }

        function resetUserForm() {
            editingUserId = null;
            document.getElementById('userFormTitle').textContent = "Kullanıcı Ekle";
            document.getElementById('userCancelBtn').classList.add('hidden');
            document.getElementById('userForm').reset();
        }

        async function deleteUser(id) {
            if(!confirm("Emin misiniz?")) return;
            const res = await fetch(`/api/users/${id}`, {method: 'DELETE', headers: getAuthHeaders()});
            if(res.ok) { fetchUsers(); }
        }

        fetchUsers();
    </script>
</body>
</html>
