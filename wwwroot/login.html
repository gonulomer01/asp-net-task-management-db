<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
</head>
<body>

    <div class="split-layout">
        <div class="brand-side">
            <img src="image.png" alt="Logo" class="brand-logo">
        </div>
        <div class="form-side">
            <div class="form-container">
                <div class="site-context-title" data-key="site_title"></div>
                <form id="loginForm">
                    <div class="field-block">
                        <label data-key="username"></label>
                        <input type="text" id="loginUsername" required autocomplete="off">
                    </div>
                    <div class="field-block">
                        <label data-key="password"></label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="submit-core-btn" data-key="login_btn"></button>
                </form>
                <div class="meta-area">
                    <span data-key="new_here"></span><a href="/register.html" data-key="register_btn"></a>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userId')) { window.location.href = '/index.html'; }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('userId', data.id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userRole', data.role);
                localStorage.setItem('userDept', data.department);
                window.location.href = '/index.html';
            } else {
                alert("Giriş başarısız.");
            }
        });
    </script>
</body>
</html>
