<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --border: #e2e8f0;
            --input-border: #cbd5e1;
        }
        html.dark {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --border: #334155;
            --input-border: #475569;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; transition: background 0.2s, color 0.2s; }
        .theme-panel { position: absolute; top: 20px; right: 20px; }
        .auth-box { width: 100%; max-w: 400px; background: var(--bg-card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 32px; box-sizing: border-box; border: 1px solid var(--border); }
        h2 { margin: 0 0 24px 0; font-size: 24px; font-weight: 700; text-align: center; color: #2563eb; }
        html.dark h2 { color: #3b82f6; }
        form { display: flex; flex-direction: column; gap: 16px; }
        input { padding: 10px 14px; border: 1px solid var(--input-border); background: var(--bg-card); color: var(--text-main); border-radius: 8px; font-size: 14px; transition: all 0.2s; }
        input:focus { border-color: #2563eb; outline: none; }
        button { padding: 10px; border: none; border-radius: 8px; background: #2563eb; color: #ffffff; font-weight: 600; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #1d4ed8; }
        .theme-btn { background: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .link-btn { background: none; border: none; color: #64748b; text-decoration: underline; font-size: 13px; margin-top: 16px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="theme-panel">
        <button class="theme-btn" onclick="toggleTheme()">Tema Değiştir</button>
    </div>

    <div class="auth-box">
        <h2>Giriş Yap</h2>
        <form id="loginForm">
            <input type="text" id="loginUsername" placeholder="Kullanıcı Adı" required>
            <input type="password" id="loginPassword" placeholder="Şifre" required>
            <button type="submit">Giriş Yap</button>
        </form>
        <button class="link-btn" onclick="window.location.href='/register.html'">Hesap Oluştur (Kayıt Ol)</button>
    </div>

    <script>
        if (localStorage.getItem('userId')) {
            window.location.href = '/index.html';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('userId', data.id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userRole', data.role);
                window.location.href = '/index.html';
            } else {
                alert("Giriş başarısız. Kullanıcı adı veya şifre hatalı.");
            }
        });
    </script>
</body>
</html>
