<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
    <style>
        :root {
            --bg-base: #ffffff;
            --bg-side: #fafafa;
            --text-title: #388ff9;
            --text-main: #262626;
            --text-muted: #8e8e8e;
            --border: #dbdbdb;
            --input-bg: #ffffff;
            --btn-bg: #111111;
            --btn-text: #ffffff;
        }
        html.dark {
            --bg-base: #0b0f19;
            --bg-side: #111827;
            --text-title: #388ff9;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #1f2937;
            --input-bg: #070a12;
            --btn-bg: #ffffff;
            --btn-text: #000000;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .top-nav { position: absolute; top: 24px; right: 24px; z-index: 10; }
        .theme-btn { background: transparent; color: var(--text-main); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .split-layout { display: flex; min-height: 100vh; }
        .brand-side { flex: 1.2; background-color: var(--bg-side); display: flex; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; }
        .brand-heading { font-size: 72px; font-weight: 800; color: var(--text-title); letter-spacing: -2px; margin: 0; text-align: center; }
        .form-side { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; box-sizing: border-box; }
        .form-container { width: 100%; max-width: 400px; }
        form { display: flex; flex-direction: column; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-main); }
        input { background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 24px; padding: 12px 20px; font-size: 14px; color: var(--text-main); box-sizing: border-box; width: 100%; }
        input:focus { border-color: var(--text-main); outline: none; }
        .submit-btn { background-color: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 24px; padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .meta-area { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted); }
        .meta-area a { color: var(--text-main); text-decoration: none; font-weight: 700; }
        .meta-area a:hover { text-decoration: underline; }
        @media (max-width: 868px) {
            .brand-side { display: none; }
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="theme-btn" onclick="toggleTheme()">Tema Değiştir</button>
    </div>

    <div class="split-layout">
        <div class="brand-side">
            <h1 class="brand-heading">Giriş yap</h1>
        </div>
        <div class="form-side">
            <div class="form-container">
                <form id="loginForm">
                    <div class="form-group">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="loginUsername" required autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>Şifre</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="submit-btn">Giriş yap</button>
                </form>
                <div class="meta-area">
                    Sistemde yeni misiniz? <a href="/register.html">Hesap oluştur</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('userId')) {
            window.location.href = '/index.html';
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('userId', data.id);
                localStorage.setItem('username', data.username);
                localStorage.setItem('userRole', data.role);
                window.location.href = '/index.html';
            } else {
                alert("Giriş başarısız. Kullanıcı adı veya şifre hatalı.");
            }
        });
    </script>
</body>
</html>
