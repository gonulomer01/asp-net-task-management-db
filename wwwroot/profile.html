<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Ayarları</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId')) { window.location.href = '/login.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1>KİŞİSEL PROFİL AYARLARI</h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>

    <div class="workspace-wrapper">
        <div class="panel-card-form" style="width:100%; max-width:400px; margin:0 auto;">
            <h2>Bilgilerimi Güncelle</h2>
            <form id="profileForm">
                <div class="field-block">
                    <label data-key="username"></label>
                    <input type="text" id="profUsername" required>
                </div>
                <div class="field-block">
                    <label data-key="password"></label>
                    <input type="password" id="profPassword" required>
                </div>
                <div class="field-block">
                    <label data-key="email"></label>
                    <input type="email" id="profEmail">
                </div>
                <div class="field-block">
                    <label data-key="department"></label>
                    <select id="profDepartment">
                        <option value="Ar-Ge">Ar-Ge</option>
                        <option value="Bilgi İşlem">Bilgi İşlem</option>
                        <option value="İnsan Kaynakları">İnsan Kaynakları</option>
                        <option value="Yönetim">Yönetim</option>
                    </select>
                </div>
                <button type="submit" class="submit-core-btn" data-key="save"></button>
            </form>
        </div>
    </div>

    <script>
        const loggedInUserId = localStorage.getItem('userId');
        const loggedInUserRole = localStorage.getItem('userRole');

        async function loadProfileData() {
            const res = await fetch('/api/users');
            const users = await res.json();
            const me = users.find(u => u.id == loggedInUserId);
            if (me) {
                document.getElementById('profUsername').value = me.username;
                document.getElementById('profPassword').value = me.password;
                document.getElementById('profEmail').value = me.email || '';
                document.getElementById('profDepartment').value = me.department;
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('profUsername').value;
            const department = document.getElementById('profDepartment').value;

            const payload = {
                id: parseInt(loggedInUserId),
                username: username,
                password: document.getElementById('profPassword').value,
                email: document.getElementById('profEmail').value,
                department: department,
                role: loggedInUserRole
            };

            const res = await fetch(`/api/users/${loggedInUserId}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                localStorage.setItem('username', username);
                localStorage.setItem('userDept', department);
                window.location.href = '/index.html';
            }
        });

        loadProfileData();
    </script>
</body>
</html>
