<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Ayarları</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/shared.js"></script>
    <script>if (!localStorage.getItem('userId')) { window.location.href = '/login.html'; }</script>
</head>
<body>

    <div class="system-view-header">
        <div class="system-header-title-group">
            <div class="corner-branding" data-key="site_title"></div>
            <h1 data-key="profile_header"></h1>
        </div>
        <div id="headerRightActions" class="header-right-actions"></div>
    </div>

    <div class="workspace-wrapper">
        <div class="nav-bar">
            <button id="btnHome" class="nav-link-btn" onclick="window.location.href='/index.html'" data-key="btn_home"></button>
            <button id="btnManageCategories" class="nav-link-btn hidden" onclick="window.location.href='/categories.html'" data-key="btn_cats"></button>
            <button id="btnManageUsers" class="nav-link-btn hidden" onclick="window.location.href='/users.html'" data-key="btn_users"></button>
            <button id="btnManageDepartments" class="nav-link-btn hidden" onclick="window.location.href='/departments.html'" data-key="btn_depts"></button>
            <button id="btnProfile" class="nav-link-btn hidden" onclick="window.location.href='/profile.html'" data-key="btn_prof"></button>
        </div>

        <div class="panel-card-form" style="width:100%; max-width:400px; margin:0 auto;">
            <h2 data-key="profile_form_title"></h2>
            <form id="profileForm">
                <div class="field-block">
                    <label data-key="username"></label>
                    <input type="text" id="profUsername" required>
                </div>
                <div class="field-block">
                    <label data-key="password"></label>
                    <input type="password" id="profPassword">
                </div>
                <div class="field-block">
                    <label data-key="email"></label>
                    <input type="email" id="profEmail">
                </div>
                <div class="field-block">
                    <label data-key="department"></label>
                    <select id="profDepartment" required></select>
                </div>
                <button type="submit" class="submit-core-btn" data-key="save"></button>
            </form>
        </div>
    </div>

    <script>
        const loggedInUserId = localStorage.getItem('userId');
        const loggedInUserRole = localStorage.getItem('userRole');

        async function populateDepartments() {
            const res = await fetch('/api/departments');
            const depts = await res.json();
            const select = document.getElementById('profDepartment');
            select.innerHTML = '';
            depts.forEach(d => {
                select.innerHTML += `<option value="${escapeHtml(d.name)}">${escapeHtml(d.name)}</option>`;
            });
        }

        async function loadProfileData() {
            if (loggedInUserRole === 'Admin') {
                document.getElementById('btnManageCategories').classList.remove('hidden');
                document.getElementById('btnManageUsers').classList.remove('hidden');
                document.getElementById('btnManageDepartments').classList.remove('hidden');
            } else {
                document.getElementById('btnProfile').classList.remove('hidden');
            }
            await populateDepartments();
            const res = await fetch('/api/users');
            const users = await res.json();
            const me = users.find(u => u.id == loggedInUserId);
            if (me) {
                document.getElementById('profUsername').value = me.username;
                document.getElementById('profPassword').value = '';
                document.getElementById('profEmail').value = me.email || '';
                document.getElementById('profDepartment').value = me.department;
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('profUsername').value;
            const department = document.getElementById('profDepartment').value;

            const payload = {
                id: parseInt(loggedInUserId),
                username: username,
                password: document.getElementById('profPassword').value,
                email: document.getElementById('profEmail').value,
                department: department,
                role: loggedInUserRole
            };

            const res = await fetch(`/api/users/${loggedInUserId}`, {
                method: 'PUT',
                headers: getAuthHeaders(),
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                localStorage.setItem('username', username);
                localStorage.setItem('userDept', department);
                window.location.href = '/index.html';
            }
        });

        loadProfileData();
    </script>
</body>
</html>
